<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MaintainIQ — Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white shadow-sm px-4 md:px-6 py-4 flex justify-between items-center sticky top-0 z-10">
  <div class="flex gap-4 items-center">
    <a href="index.html" class="text-xl font-bold text-gray-800">MaintainIQ</a>
    <a href="dashboard.html" class="text-sm font-medium text-blue-600">Dashboard</a>
    <a href="maintenance.html" class="text-sm text-gray-500 hover:text-blue-600">Maintenance</a>
  </div>
  <button onclick="resetDemoData()" class="text-xs text-red-600 hover:underline">Reset Demo Data</button>
</nav>

<main class="max-w-5xl mx-auto p-4 md:p-6">
  <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

  <div class="flex flex-col md:flex-row gap-3 mb-4">
    <input id="searchInput" placeholder="Search by name or code..." class="flex-1 px-3 py-2 border rounded-lg" />
    <select id="statusFilter" class="px-3 py-2 border rounded-lg">
      <option value="">All statuses</option>
    </select>
    <button id="newAssetBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">+ New Asset</button>
  </div>

  <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
    <table class="w-full text-sm text-left">
      <thead class="bg-gray-100 text-gray-600">
        <tr><th class="px-4 py-3">Code</th><th class="px-4 py-3">Name</th><th class="px-4 py-3">Location</th>
            <th class="px-4 py-3">Status</th><th class="px-4 py-3">Open Issues</th><th></th></tr>
      </thead>
      <tbody id="assetRows"></tbody>
    </table>
  </div>
</main>

<!-- Asset details panel (slides in when a row is clicked) -->
<div id="assetPanel" class="fixed inset-0 bg-black/40 hidden items-start justify-center z-20 overflow-y-auto py-6">
  <div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4">
    <div class="flex justify-between items-start mb-4">
      <h2 id="panelTitle" class="text-lg font-bold text-gray-800"></h2>
      <button id="closePanel" class="text-gray-400 hover:text-gray-700 text-xl leading-none">&times;</button>
    </div>
    <div id="panelBody"></div>
  </div>
</div>

<!-- New Asset Modal -->
<div id="newAssetModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-20">
  <div class="bg-white rounded-xl p-6 w-full max-w-md mx-4">
    <h2 class="text-lg font-bold mb-4">Register New Asset</h2>
    <form id="newAssetForm" class="space-y-3">
      <input required id="fName" placeholder="Asset name" class="w-full px-3 py-2 border rounded-lg" />
      <input id="fCategory" placeholder="Category" class="w-full px-3 py-2 border rounded-lg" />
      <input id="fLocation" placeholder="Location" class="w-full px-3 py-2 border rounded-lg" />
      <input id="fCondition" placeholder="Condition" class="w-full px-3 py-2 border rounded-lg" />
      <p id="dupError" class="text-red-600 text-xs hidden">That asset code already exists — try again.</p>
      <div class="flex gap-2 pt-2">
        <button type="button" id="cancelNewAsset" class="flex-1 border rounded-lg py-2">Cancel</button>
        <button type="submit" class="flex-1 bg-blue-600 text-white rounded-lg py-2">Create</button>
      </div>
    </form>
  </div>
</div>

<script src="shared.js"></script>
<script>
ensureSeeded();

document.getElementById("statusFilter").innerHTML += Object.keys(STATUS_COLORS).map(s => `<option>${s}</option>`).join("");

function openIssueCount(assetId) {
  return load(KEYS.issues).filter(i => i.assetId === assetId && !["Resolved", "Closed"].includes(i.status)).length;
}

function renderSummary() {
  const assets = load(KEYS.assets);
  const counts = {};
  assets.forEach(a => counts[a.status] = (counts[a.status] || 0) + 1);
  const cards = [
    ["Total Assets", assets.length, "text-gray-800"],
    ["Operational", counts["Operational"] || 0, "text-green-600"],
    ["Issues Reported", counts["Issue Reported"] || 0, "text-yellow-600"],
    ["Out of Service", counts["Out of Service"] || 0, "text-red-600"],
  ];
  document.getElementById("summaryCards").innerHTML = cards.map(([label, val, color]) => `
    <div class="bg-white rounded-xl shadow-sm p-4">
      <p class="text-sm text-gray-500">${label}</p>
      <p class="text-2xl font-bold ${color}">${val}</p>
    </div>
  `).join("");
}

function renderRows(assets) {
  const tbody = document.getElementById("assetRows");
  if (assets.length === 0) { tbody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-gray-400">No assets found.</td></tr>`; return; }
  tbody.innerHTML = assets.map(a => `
    <tr class="border-t hover:bg-gray-50 cursor-pointer" onclick="openAssetPanel('${a.id}')">
      <td class="px-4 py-3 font-mono text-xs">${a.code}</td>
      <td class="px-4 py-3 font-medium">${a.name}</td>
      <td class="px-4 py-3">${a.location || "—"}</td>
      <td class="px-4 py-3">${badge(a.status, STATUS_COLORS)}</td>
      <td class="px-4 py-3">${openIssueCount(a.id)}</td>
      <td class="px-4 py-3 text-blue-600 text-xs">View →</td>
    </tr>
  `).join("");
}

function refreshDashboard() {
  renderSummary();
  const q = document.getElementById("searchInput").value.toLowerCase();
  const statusVal = document.getElementById("statusFilter").value;
  const filtered = load(KEYS.assets).filter(a =>
    (a.name.toLowerCase().includes(q) || a.code.toLowerCase().includes(q)) &&
    (statusVal === "" || a.status === statusVal)
  );
  renderRows(filtered);
}

document.getElementById("searchInput").addEventListener("input", refreshDashboard);
document.getElementById("statusFilter").addEventListener("change", refreshDashboard);

function openAssetPanel(id) {
  const asset = load(KEYS.assets).find(a => a.id === id);
  const issues = load(KEYS.issues).filter(i => i.assetId === id);
  const history = load(KEYS.history).filter(h => h.assetId === id);
  const clientUrl = `${location.origin}${location.pathname.replace("dashboard.html", "client.html")}?code=${asset.code}`;

  document.getElementById("panelTitle").textContent = asset.name;
  document.getElementById("panelBody").innerHTML = `
    <p class="text-xs font-mono text-gray-500 mb-2">${asset.code}</p>
    <div class="flex justify-between items-start gap-4 mb-4">
      <div>
        <div class="mb-2">${badge(asset.status, STATUS_COLORS)}</div>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div><p class="text-gray-500">Category</p><p class="font-medium">${asset.category || "—"}</p></div>
          <div><p class="text-gray-500">Location</p><p class="font-medium">${asset.location || "—"}</p></div>
          <div><p class="text-gray-500">Condition</p><p class="font-medium">${asset.condition || "—"}</p></div>
          <div><p class="text-gray-500">Next Service</p><p class="font-medium">${fmtDate(asset.nextService)}</p></div>
        </div>
      </div>
      <div class="flex flex-col items-center gap-1">
        <div id="qrcode"></div>
        <button id="copyLinkBtn" class="text-xs px-2 py-1 border rounded-lg hover:bg-gray-50">Copy Link</button>
        <a href="${clientUrl}" target="_blank" class="text-xs px-2 py-1 border rounded-lg hover:bg-gray-50">Open Client Page</a>
      </div>
    </div>

    <div class="flex gap-2 flex-wrap items-center mb-4 border-t pt-3">
      <label class="text-sm text-gray-500">Change status:</label>
      <select id="statusSelect" class="px-2 py-1 border rounded-lg text-sm">
        ${Object.keys(STATUS_COLORS).map(s => `<option ${s === asset.status ? "selected" : ""}>${s}</option>`).join("")}
      </select>
      <button id="updateStatusBtn" class="text-sm bg-blue-600 text-white px-3 py-1 rounded-lg">Update</button>
    </div>

    <div class="border-t pt-3 mb-3">
      <h3 class="font-semibold text-sm text-gray-700 mb-2">Issues (${issues.length})</h3>
      ${issues.length === 0 ? `<p class="text-gray-400 text-xs">No issues reported yet.</p>` :
        issues.map(i => `
          <a href="maintenance.html?issue=${i.id}" class="flex justify-between items-center border rounded-lg p-2 mb-2 hover:bg-gray-50 text-sm">
            <span>${i.title} <span class="text-xs text-gray-400">(${i.issueNumber})</span></span>
            ${badge(i.status, ISSUE_COLORS)}
          </a>
        `).join("")}
    </div>

    <div class="border-t pt-3">
      <h3 class="font-semibold text-sm text-gray-700 mb-2">History</h3>
      ${history.length === 0 ? `<p class="text-gray-400 text-xs">No history yet.</p>` :
        history.slice(0, 8).map(h => `
          <div class="border-l-2 border-blue-400 pl-2 mb-2 text-xs">
            <p class="font-medium">${h.action}</p>
            <p class="text-gray-500">${h.actor} · ${fmtDate(h.createdAt)}</p>
          </div>
        `).join("")}
    </div>
  `;

  new QRCode(document.getElementById("qrcode"), { text: clientUrl, width: 90, height: 90 });
  document.getElementById("copyLinkBtn").addEventListener("click", () => {
    navigator.clipboard.writeText(clientUrl);
    alert("Client link copied!");
  });
  document.getElementById("updateStatusBtn").addEventListener("click", () => {
    const newStatus = document.getElementById("statusSelect").value;
    const assets = load(KEYS.assets);
    const idx = assets.findIndex(a => a.id === id);
    assets[idx].status = newStatus;
    save(KEYS.assets, assets);
    logHistory(id, `Status changed to ${newStatus}`, "admin");
    openAssetPanel(id);
    refreshDashboard();
  });

  const panel = document.getElementById("assetPanel");
  panel.classList.remove("hidden"); panel.classList.add("flex");
}

document.getElementById("closePanel").addEventListener("click", () => {
  document.getElementById("assetPanel").classList.add("hidden");
});

document.getElementById("newAssetBtn").addEventListener("click", () => {
  const modal = document.getElementById("newAssetModal");
  modal.classList.remove("hidden"); modal.classList.add("flex");
});
document.getElementById("cancelNewAsset").addEventListener("click", () => {
  document.getElementById("newAssetModal").classList.add("hidden");
});
document.getElementById("newAssetForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const assets = load(KEYS.assets);
  let code, tries = 0;
  do { code = "AST-" + Math.random().toString(36).slice(2, 7).toUpperCase(); tries++; }
  while (assets.some(a => a.code === code) && tries < 10);

  if (assets.some(a => a.code === code)) {
    document.getElementById("dupError").classList.remove("hidden");
    return;
  }

  const newAsset = {
    id: uid(), code,
    name: document.getElementById("fName").value,
    category: document.getElementById("fCategory").value,
    location: document.getElementById("fLocation").value,
    condition: document.getElementById("fCondition").value,
    status: "Operational", lastService: null, nextService: null,
  };
  assets.push(newAsset);
  save(KEYS.assets, assets);
  logHistory(newAsset.id, "Asset registered", "admin");
  document.getElementById("newAssetModal").classList.add("hidden");
  document.getElementById("newAssetForm").reset();
  refreshDashboard();
});

refreshDashboard();
</script>
</body>
</html>
